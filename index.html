<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Music Art Project</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
background:white;
color:black;

display:flex;
flex-direction:column;
align-items:center;
justify-content:space-between;

min-height:100vh;
padding:30px 20px;
}

/* COVER */

.cover{
width:100%;
max-width:650px;

opacity:0;
transform:translateY(30px);
animation:fadeUp 1.2s ease forwards;
}

.cover img{
width:100%;
border-radius:6px;
display:block;
}

/* PLAYER */

.player{
width:100%;
max-width:650px;
margin-top:40px;

opacity:0;
transform:translateY(30px);
animation:fadeUp 1.4s ease forwards;
animation-delay:0.4s;
}

/* CONTROLS */

.controls{
display:flex;
align-items:center;
gap:18px;
margin-bottom:14px;
}

.play{
font-size:22px;
cursor:pointer;
background:none;
border:none;
}

.play:hover{
opacity:0.6;
}

/* TIME */

.time{
font-size:12px;
opacity:.6;
min-width:80px;
}

/* PROGRESS */

.progress-container{
width:100%;
height:5px;
background:#e6e6e6;
border-radius:10px;
cursor:pointer;
position:relative;
}

.progress{
height:100%;
width:0%;
background:black;
border-radius:10px;
position:relative;
}

/* KNOB */

.progress::after{
content:"";
position:absolute;
right:-6px;
top:50%;
transform:translateY(-50%);
width:12px;
height:12px;
background:black;
border-radius:50%;
opacity:0;
transition:opacity .2s;
}

.progress-container:hover .progress::after{
opacity:1;
}

/* VOLUME */

.volume{
margin-top:16px;
width:120px;
}

input[type=range]{
appearance:none;
height:3px;
background:#ddd;
border-radius:5px;
outline:none;
}

input[type=range]::-webkit-slider-thumb{
appearance:none;
width:10px;
height:10px;
border-radius:50%;
background:black;
cursor:pointer;
}

/* FOOTER */

.footer{
margin-top:40px;
font-size:11px;
opacity:.35;
letter-spacing:.08em;
}

/* ANIMATION */

@keyframes fadeUp{
to{
opacity:1;
transform:translateY(0);
}
}

/* MOBILE */

@media (max-width:600px){

.controls{
gap:14px;
}

.play{
font-size:20px;
}

.time{
font-size:11px;
}

}

</style>
</head>

<body>

<div class="cover">
<img src="cover.jpg">
</div>

<audio id="audio" src="track.mp3"></audio>

<div class="player">

<div class="controls">

<button class="play" id="play">▶</button>

<div class="time" id="time">
0:00 / 0:00
</div>

</div>

<div class="progress-container" id="progress-container">
<div class="progress" id="progress"></div>
</div>

<input class="volume" id="volume" type="range" min="0" max="1" step="0.01" value="1">

</div>

<div class="footer">
music art project
</div>

<script>

const audio=document.getElementById("audio")
const playBtn=document.getElementById("play")
const progress=document.getElementById("progress")
const progressContainer=document.getElementById("progress-container")
const volume=document.getElementById("volume")
const timeDisplay=document.getElementById("time")

let playing=false

playBtn.onclick=()=>{

if(playing){
audio.pause()
playBtn.textContent="▶"
}else{
audio.play()
playBtn.textContent="❚❚"
}

playing=!playing

}

audio.addEventListener("timeupdate",()=>{

const percent=(audio.currentTime/audio.duration)*100
progress.style.width=percent+"%"

updateTime()

})

function updateTime(){

const current=formatTime(audio.currentTime)
const duration=formatTime(audio.duration)

timeDisplay.textContent=current+" / "+duration

}

function formatTime(t){

if(!t)return"0:00"

const minutes=Math.floor(t/60)
const seconds=Math.floor(t%60)

return minutes+":"+(seconds<10?"0"+seconds:seconds)

}

progressContainer.addEventListener("click",(e)=>{

const width=progressContainer.clientWidth
const clickX=e.offsetX
const duration=audio.duration

audio.currentTime=(clickX/width)*duration

})

volume.addEventListener("input",()=>{

audio.volume=volume.value

})

</script>

</body>
</html>
